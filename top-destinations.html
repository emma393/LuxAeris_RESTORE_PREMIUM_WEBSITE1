<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Top Destinations Worldwide | LuxAeris</title>
  <meta name="description" content="Explore top global destinations for premium cabin travel. Browse by region, search by city or airport code, and request premium flight options." />
  <meta name="theme-color" content="#0b0b0c" />
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <script src="/assets/site.js" defer></script>

  <main class="wrap" style="padding-top:28px;padding-bottom:28px;">
    <section class="dir-hero">
      <div class="kicker">Browse • Inspire • Request</div>
      <h1>Top destinations worldwide</h1>
      <p class="muted route-lead">Explore cities and high-demand leisure destinations with strong premium cabin demand. Search, filter by region, and move directly into a quote request.</p>

      <div class="dir-tools">
        <input id="destSearch" placeholder="Search by city, country or airport code (e.g. London, Italy, DXB)" autocomplete="off" />
        <div class="smallnote" id="destCount">—</div>
      </div>

      <div class="filter-bar">
        <select id="regionFilter">
          <option value="">All regions</option>
          <option>Americas</option><option>Asia</option><option>Europe</option><option>Europe/Asia</option><option>Indian Ocean</option><option>Middle East</option><option>Oceania</option>
        </select>
        <a class="btn btn--primary" href="/request.html">Request a quote</a>
      </div>
    </section>

    <section class="section">
      <div class="dest-grid" id="destGrid"></div>
    </section>
  </main>

g": "Beach • Nightlife • Design", "highlights": ["South Beach", "Design District", "Little Havana", "Yacht scene"], "best_for": ["Winter sun", "Events", "Couples"], "image": "https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=1600&q=80", "credit": "Unsplash"}, {"city": "Cancún", "country": "Mexico", "iata": ["CUN"], "region": "Americas", "tag": "Resorts • Beaches • Easy", "highlights": ["Resorts", "Isla Mujeres", "Tulum day trip", "Snorkeling"], "best_for": ["Resorts", "Family", "Quick escapes"], "image": "https://images.unsplash.com/photo-1526779259212-6d77d8b3c4df?auto=format&fit=crop&w=1600&q=80", "credit": "Unsplash"}, {"city": "Las Vegas", "country": "USA", "iata": ["LAS"], "region": "Americas", "tag": "Luxury hotels • Shows • Dining", "highlights": ["The Strip", "Top shows", "Fine dining", "Grand Canyon day trip"], "best_for": ["Events", "Groups", "Dining"], "image": "https://images.unsplash.com/photo-1504460913899-5151f1c1a1f0?auto=format&fit=crop&w=1600&q=80", "credit": "Unsplash"}, {"city": "Sydney", "country": "Australia", "iata": ["SYD"], "region": "Oceania", "tag": "Harbour • Beaches • Dining", "highlights": ["Opera House", "Harbour cruise", "Bondi", "Blue Mountains"], "best_for": ["Long-haul luxury", "Family", "City+beach"], "image": "https://images.unsplash.com/photo-1506973035872-a4f23efb2549?auto=format&fit=crop&w=1600&q=80", "credit": "Unsplash"}, {"city": "Melbourne", "country": "Australia", "iata": ["MEL"], "region": "Oceania", "tag": "Coffee • Culture • Events", "highlights": ["Laneways", "Great Ocean Road", "Food scene", "Arts"], "best_for": ["Culture", "Events", "City breaks"], "image": "https://images.unsplash.com/photo-1509099836639-18ba1795216d?auto=format&fit=crop&w=1600&q=80", "credit": "Unsplash"}, {"city": "Maldives", "country": "Maldives", "iata": ["MLE"], "region": "Indian Ocean", "tag": "Overwater villas • Private islands", "highlights": ["Overwater villa", "Diving", "Sunset cruise", "Spa"], "best_for": ["Honeymoon", "Luxury escape", "Privacy"], "image": "https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=1600&q=80", "credit": "Unsplash"}, {"city": "Santorini", "country": "Greece", "iata": ["JTR"], "region": "Europe", "tag": "Cliffside views • Sunset", "highlights": ["Oia sunset", "Caldera cruise", "Wineries", "Beach clubs"], "best_for": ["Romance", "Luxury", "Photography"], "image": "https://images.unsplash.com/photo-1505778276668-26b3ff7af103?auto=format&fit=crop&w=1600&q=80", "credit": "Unsplash"}, {"city": "Nice", "country": "France", "iata": ["NCE"], "region": "Europe", "tag": "Riviera • Yacht scene", "highlights": ["Promenade des Anglais", "Monaco day trip", "Beach clubs", "Old Town"], "best_for": ["Summer luxury", "Couples", "Events"], "image": "https://images.unsplash.com/photo-1533105079780-92b9be482077?auto=format&fit=crop&w=1600&q=80", "credit": "Unsplash"}, {"city": "Vienna", "country": "Austria", "iata": ["VIE"], "region": "Europe", "tag": "Classical • Palaces • Cafés", "highlights": ["Schönbrunn", "Opera", "MuseumsQuartier", "Coffee houses"], "best_for": ["Culture", "Winter breaks", "Luxury hotels"], "image": "https://images.unsplash.com/photo-1526392060635-9d6019884377?auto=format&fit=crop&w=1600&q=80", "credit": "Unsplash"}, {"city": "Prague", "country": "Czechia", "iata": ["PRG"], "region": "Europe", "tag": "Old Town • Views", "highlights": ["Charles Bridge", "Castle", "Old Town Square", "River cruise"], "best_for": ["Romance", "Value luxury", "Weekend"], "image": "https://images.unsplash.com/photo-1526481280695-3c687fd643ed?auto=format&fit=crop&w=1600&q=80", "credit": "Unsplash"}];
    const grid = document.getElementById('destGrid');
    const q = document.getElementById('destSearch');
    const rf = document.getElementById('regionFilter');
    const count = document.getElementById('destCount');

    function esc(s) {
      return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    }

    function render() {
      const term = (q.value || '').trim().toLowerCase();
      const region = rf.value || '';
      let items = DATA.filter(x =>
        (!region || x.region === region) &&
        (!term ||
          x.city.toLowerCase().includes(term) ||
          x.country.toLowerCase().includes(term) ||
          (x.iata || []).join(' ').toLowerCase().includes(term))
      );
      count.textContent = items.length + ' destinations';
      grid.innerHTML = items.map(x => `
        <article class="cardx">
          <img class="cardx__img" src="${esc(x.image)}" alt="${esc(x.city)}" loading="lazy"/>
          <div class="cardx__bd">
            <div class="cardx__t">${esc(x.city)}, ${esc(x.country)}</div>
            <div class="cardx__m">${esc(x.tag || '')}</div>
            <div class="citymeta">
              <span>${esc(x.region || 'Global')}</span>
              <span>${esc((x.iata || []).join(' • '))}</span>
            </div>
            <div class="cardx__a">
              <a class="btn btn--primary" href="/destination-pages/business-class-flights-to-${encodeURIComponent(x.city.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''))}.html">Open</a>
              <a class="btn" href="/request.html?destination=${encodeURIComponent(x.city)}">Request</a>
            </div>
          </div>
        </article>
      `).join('');
    }

    q.addEventListener('input', render);
    rf.addEventListener('change', render);
    render();
  </script>
</body>
</html>
